<!doctype html>

<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0019a8" />
  <title>Offline Tube Route Planner</title>
  <style>
    :root {
      --blue: #0019a8;
      --ink: #111827;
      --muted: #667085;
      --paper: #ffffff;
      --soft: #f3f4f6;
      --line: #d0d5dd;
      --accent: #e32017;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }* { box-sizing: border-box; }
body { margin: 0; background: var(--soft); color: var(--ink); }

header {
  padding: 1rem clamp(1rem, 4vw, 2rem);
  background: var(--blue);
  color: white;
  display: grid;
  gap: .25rem;
}

header h1 { margin: 0; font-size: clamp(1.3rem, 3vw, 2rem); }
header p { margin: 0; color: rgba(255,255,255,.82); }

main {
  display: grid;
  grid-template-columns: minmax(20rem, 28rem) 1fr;
  min-height: calc(100vh - 5.5rem);
}

aside {
  padding: 1rem;
  background: var(--paper);
  border-right: 1px solid var(--line);
  overflow: auto;
}

form { display: grid; gap: .75rem; }
label { display: grid; gap: .35rem; font-weight: 700; }
input {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: .75rem;
  padding: .8rem .9rem;
  font: inherit;
}

button {
  border: 0;
  border-radius: .75rem;
  padding: .9rem 1rem;
  font: inherit;
  font-weight: 800;
  background: var(--blue);
  color: white;
  cursor: pointer;
}

button:hover { filter: brightness(1.08); }

.status {
  margin: 1rem 0;
  padding: .75rem;
  border-radius: .75rem;
  background: #fff7ed;
  color: #7c2d12;
  font-size: .92rem;
  display: none;
}

.status.show { display: block; }

.route-card {
  border: 1px solid var(--line);
  border-radius: 1rem;
  padding: 1rem;
  margin-top: 1rem;
  background: white;
  box-shadow: 0 8px 24px rgba(16,24,40,.06);
}

.route-card h2 { margin: 0 0 .35rem; font-size: 1.05rem; }
.metric { color: var(--muted); margin: 0 0 .85rem; }
ol { margin: 0; padding-left: 1.3rem; }
li { margin: .28rem 0; }

.line-pill {
  display: inline-block;
  border-radius: 999px;
  padding: .12rem .48rem;
  margin-left: .35rem;
  font-size: .78rem;
  font-weight: 800;
  color: white;
  vertical-align: middle;
  white-space: nowrap;
}

.map-wrap {
  position: relative;
  overflow: auto;
  background: #f8fafc;
}

#mapStage {
  min-width: 980px;
  min-height: 760px;
  padding: 1rem;
}

#mapStage svg {
  width: 100%;
  height: auto;
  display: block;
  background: white;
  border-radius: 1rem;
  box-shadow: 0 8px 32px rgba(16,24,40,.12);
}

#mapStage.route-active svg path,
#mapStage.route-active svg polyline,
#mapStage.route-active svg line {
  opacity: .16;
}

#mapStage.route-active svg text { opacity: .32; }
#mapStage svg .route-label {
  opacity: 1 !important;
  font-weight: 900 !important;
  paint-order: stroke;
  stroke: #fff200;
  stroke-width: 6px;
  stroke-linejoin: round;
  fill: #000 !important;
}

#mapStage svg .route-station-dot {
  opacity: 1 !important;
  stroke: #fff200 !important;
  stroke-width: 8 !important;
  filter: drop-shadow(0 0 4px #fff200);
}

.offline-note {
  position: absolute;
  right: 1rem;
  top: 1rem;
  background: rgba(255,255,255,.92);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: .35rem .65rem;
  font-size: .85rem;
  color: var(--muted);
}

@media (max-width: 850px) {
  main { grid-template-columns: 1fr; }
  aside { border-right: 0; border-bottom: 1px solid var(--line); }
  #mapStage { min-width: 760px; }
}

  </style>
</head>
<body>
  <header>
    <h1>Offline Tube Route Planner</h1>
    <p>Static average routing model with cached TfL map SVG.</p>
  </header>  <main>
    <aside>
      <form id="planner">
        <label>Start
          <input id="start" list="stations" autocomplete="off" placeholder="e.g. Brixton" required />
        </label>
        <label>Destination
          <input id="destination" list="stations" autocomplete="off" placeholder="e.g. King’s Cross St. Pancras" required />
        </label>
        <datalist id="stations"></datalist>
        <button>Go</button>
      </form>
      <p id="status" class="status"></p>
      <section id="results"></section>
    </aside><section class="map-wrap" aria-label="Tube map">
  <div class="offline-note" id="offlineNote">Map cache: checking…</div>
  <div id="mapStage">Loading map…</div>
</section>

  </main><script>
const MAP_URL = "https://foi.tfl.gov.uk/FOI-3009-2324/standard-tube-map-2023.svg";
const TRANSFER_MINUTES = 5;
const DEFAULT_EDGE_MINUTES = 2.4;

const LINE_COLOURS = {
  Bakerloo: "#B36305", Central: "#E32017", Circle: "#FFD300", District: "#00782A",
  "Hammersmith & City": "#F3A9BB", Jubilee: "#A0A5A9", Metropolitan: "#9B0056",
  Northern: "#000000", Piccadilly: "#003688", Victoria: "#0098D4", "Waterloo & City": "#95CDBA"
};

const MODEL = {
  lines: {
    Bakerloo: ["Harrow & Wealdstone","Kenton","South Kenton","North Wembley","Wembley Central","Stonebridge Park","Harlesden","Willesden Junction","Kensal Green","Queen's Park","Kilburn Park","Maida Vale","Warwick Avenue","Paddington","Edgware Road","Marylebone","Baker Street","Regent's Park","Oxford Circus","Piccadilly Circus","Charing Cross","Embankment","Waterloo","Lambeth North","Elephant & Castle"],
    Central: ["West Ruislip","Ruislip Gardens","South Ruislip","Northolt","Greenford","Perivale","Hanger Lane","North Acton","East Acton","White City","Shepherd's Bush","Holland Park","Notting Hill Gate","Queensway","Lancaster Gate","Marble Arch","Bond Street","Oxford Circus","Tottenham Court Road","Holborn","Chancery Lane","St. Paul's","Bank","Liverpool Street","Bethnal Green","Mile End","Stratford","Leyton","Leytonstone","Snaresbrook","South Woodford","Woodford","Buckhurst Hill","Loughton","Debden","Theydon Bois","Epping"],
    "Central Hainault loop": ["Leytonstone","Wanstead","Redbridge","Gants Hill","Newbury Park","Barkingside","Fairlop","Hainault","Grange Hill","Chigwell","Roding Valley","Woodford"],
    Circle: ["Hammersmith","Goldhawk Road","Shepherd's Bush Market","Wood Lane","Latimer Road","Ladbroke Grove","Westbourne Park","Royal Oak","Paddington","Edgware Road","Baker Street","Great Portland Street","Euston Square","King's Cross St. Pancras","Farringdon","Barbican","Moorgate","Liverpool Street","Aldgate","Tower Hill","Monument","Cannon Street","Mansion House","Blackfriars","Temple","Embankment","Westminster","St. James's Park","Victoria","Sloane Square","South Kensington","Gloucester Road","High Street Kensington","Notting Hill Gate","Bayswater","Paddington"],
    District: ["Upminster","Upminster Bridge","Hornchurch","Elm Park","Dagenham East","Dagenham Heathway","Becontree","Upney","Barking","East Ham","Upton Park","Plaistow","West Ham","Bromley-by-Bow","Bow Road","Mile End","Stepney Green","Whitechapel","Aldgate East","Tower Hill","Monument","Cannon Street","Mansion House","Blackfriars","Temple","Embankment","Westminster","St. James's Park","Victoria","Sloane Square","South Kensington","Gloucester Road","Earl's Court","West Kensington","Barons Court","Hammersmith","Ravenscourt Park","Stamford Brook","Turnham Green","Gunnersbury","Kew Gardens","Richmond"],
    "District Wimbledon": ["Earl's Court","West Brompton","Fulham Broadway","Parsons Green","Putney Bridge","East Putney","Southfields","Wimbledon Park","Wimbledon"],
    "District Ealing": ["Earl's Court","High Street Kensington","Notting Hill Gate","Bayswater","Paddington","Edgware Road"],
    "District Ealing Broadway": ["Turnham Green","Chiswick Park","Acton Town","Ealing Common","Ealing Broadway"],
    "District Kensington": ["High Street Kensington","Kensington (Olympia)"],
    "Hammersmith & City": ["Hammersmith","Goldhawk Road","Shepherd's Bush Market","Wood Lane","Latimer Road","Ladbroke Grove","Westbourne Park","Royal Oak","Paddington","Edgware Road","Baker Street","Great Portland Street","Euston Square","King's Cross St. Pancras","Farringdon","Barbican","Moorgate","Liverpool Street","Aldgate East","Whitechapel","Stepney Green","Mile End","Bow Road","Bromley-by-Bow","West Ham","Plaistow","Upton Park","East Ham","Barking"],
    Jubilee: ["Stanmore","Canons Park","Queensbury","Kingsbury","Wembley Park","Neasden","Dollis Hill","Willesden Green","Kilburn","West Hampstead","Finchley Road","Swiss Cottage","St. John's Wood","Baker Street","Bond Street","Green Park","Westminster","Waterloo","Southwark","London Bridge","Bermondsey","Canada Water","Canary Wharf","North Greenwich","Canning Town","West Ham","Stratford"],
    Metropolitan: ["Aldgate","Liverpool Street","Moorgate","Barbican","Farringdon","King's Cross St. Pancras","Euston Square","Great Portland Street","Baker Street","Finchley Road","Wembley Park","Preston Road","Northwick Park","Harrow-on-the-Hill","North Harrow","Pinner","Northwood Hills","Northwood","Moor Park","Rickmansworth","Chorleywood","Chalfont & Latimer","Amersham"],
    "Metropolitan Watford": ["Moor Park","Croxley","Watford"],
    "Metropolitan Uxbridge": ["Harrow-on-the-Hill","West Harrow","Rayners Lane","Eastcote","Ruislip Manor","Ruislip","Ickenham","Hillingdon","Uxbridge"],
    Northern: ["Morden","South Wimbledon","Colliers Wood","Tooting Broadway","Tooting Bec","Balham","Clapham South","Clapham Common","Clapham North","Stockwell","Oval","Kennington","Waterloo","Embankment","Charing Cross","Leicester Square","Tottenham Court Road","Goodge Street","Warren Street","Euston","Mornington Crescent","Camden Town","Chalk Farm","Belsize Park","Hampstead","Golders Green","Brent Cross","Hendon Central","Colindale","Burnt Oak","Edgware"],
    "Northern Bank": ["Kennington","Elephant & Castle","Borough","London Bridge","Bank","Moorgate","Old Street","Angel","King's Cross St. Pancras","Euston","Camden Town","Kentish Town","Tufnell Park","Archway","Highgate","East Finchley","Finchley Central","West Finchley","Woodside Park","Totteridge & Whetstone","High Barnet"],
    "Northern Mill Hill": ["Finchley Central","Mill Hill East"],
    "Northern Battersea": ["Kennington","Nine Elms","Battersea Power Station"],
    Piccadilly: ["Cockfosters","Oakwood","Southgate","Arnos Grove","Bounds Green","Wood Green","Turnpike Lane","Manor House","Finsbury Park","Arsenal","Holloway Road","Caledonian Road","King's Cross St. Pancras","Russell Square","Holborn","Covent Garden","Leicester Square","Piccadilly Circus","Green Park","Hyde Park Corner","Knightsbridge","South Kensington","Gloucester Road","Earl's Court","Barons Court","Hammersmith","Turnham Green","Acton Town","Ealing Common","North Ealing","Park Royal","Alperton","Sudbury Town","Sudbury Hill","South Harrow","Rayners Lane","Eastcote","Ruislip Manor","Ruislip","Ickenham","Hillingdon","Uxbridge"],
    "Piccadilly Heathrow": ["Acton Town","South Ealing","Northfields","Boston Manor","Osterley","Hounslow East","Hounslow Central","Hounslow West","Hatton Cross","Heathrow Terminals 2 & 3","Heathrow Terminal 5"],
    "Piccadilly T4": ["Heathrow Terminals 2 & 3","Heathrow Terminal 4","Hatton Cross"],
    Victoria: ["Walthamstow Central","Blackhorse Road","Tottenham Hale","Seven Sisters","Finsbury Park","Highbury & Islington","King's Cross St. Pancras","Euston","Warren Street","Oxford Circus","Green Park","Victoria","Pimlico","Vauxhall","Stockwell","Brixton"],
    "Waterloo & City": ["Waterloo","Bank"]
  }
};

const lineName = key => key.split(" ")[0] === "Central" && key !== "Central" ? "Central" :
  key.startsWith("District") ? "District" : key.startsWith("Metropolitan") ? "Metropolitan" :
  key.startsWith("Northern") ? "Northern" : key.startsWith("Piccadilly") ? "Piccadilly" : key;

function canonical(s) {
  return s.trim().toLowerCase().replace(/[’']/g, "'").replace(/\s+/g, " ");
}

function buildGraph() {
  const graph = new Map();
  const stations = new Set();
  for (const [rawLine, stops] of Object.entries(MODEL.lines)) {
    const line = lineName(rawLine);
    stops.forEach(s => stations.add(s));
    for (let i = 0; i < stops.length - 1; i++) {
      const a = stops[i], b = stops[i + 1];
      const minutes = DEFAULT_EDGE_MINUTES + (/[A-Z]/.test(a[0]) && /Heathrow|Amersham|Epping|Uxbridge|Watford|Richmond/.test(a + b) ? 1.2 : 0);
      if (!graph.has(a)) graph.set(a, []);
      if (!graph.has(b)) graph.set(b, []);
      graph.get(a).push({ to: b, line, minutes });
      graph.get(b).push({ to: a, line, minutes });
    }
  }
  return { graph, stations: [...stations].sort((a,b) => a.localeCompare(b)) };
}

const { graph, stations } = buildGraph();
const stationLookup = new Map(stations.map(s => [canonical(s), s]));
const datalist = document.querySelector("#stations");
datalist.innerHTML = stations.map(s => `<option value="${s.replace(/"/g, '&quot;')}"></option>`).join("");

function dijkstra(start, end, mode) {
  const dist = new Map([[start, 0]]);
  const prev = new Map();
  const q = new Set(stations);
  while (q.size) {
    let u = null, best = Infinity;
    for (const s of q) if ((dist.get(s) ?? Infinity) < best) { best = dist.get(s); u = s; }
    if (!u || u === end) break;
    q.delete(u);
    for (const edge of graph.get(u) ?? []) {
      if (!q.has(edge.to)) continue;
      const previousLine = prev.get(u)?.line;
      const transfer = previousLine && previousLine !== edge.line ? TRANSFER_MINUTES : 0;
      const cost = mode === "shortest" ? 1 : edge.minutes + transfer;
      const alt = dist.get(u) + cost;
      if (alt < (dist.get(edge.to) ?? Infinity)) {
        dist.set(edge.to, alt);
        prev.set(edge.to, { from: u, line: edge.line, minutes: edge.minutes + transfer });
      }
    }
  }
  if (!prev.has(end) && start !== end) return null;
  const legs = [];
  let cur = end;
  while (cur !== start) {
    const p = prev.get(cur);
    legs.push({ from: p.from, to: cur, line: p.line, minutes: p.minutes });
    cur = p.from;
  }
  legs.reverse();
  return { legs, stations: [start, ...legs.map(l => l.to)], cost: dist.get(end) };
}

function compactInstructions(route) {
  if (!route) return [];
  const out = [];
  let current = null;
  for (const leg of route.legs) {
    if (!current || current.line !== leg.line) {
      if (current) out.push(current);
      current = { line: leg.line, from: leg.from, to: leg.to, stops: 1, minutes: leg.minutes };
    } else {
      current.to = leg.to;
      current.stops += 1;
      current.minutes += leg.minutes;
    }
  }
  if (current) out.push(current);
  return out;
}

function routeCard(title, route, mode) {
  if (!route) return `<article class="route-card"><h2>${title}</h2><p>No route found in the static model.</p></article>`;
  const instructions = compactInstructions(route);
  const minutes = route.legs.reduce((t, l) => t + l.minutes, 0);
  const stops = route.legs.length;
  return `<article class="route-card">
    <h2>${title}</h2>
    <p class="metric">Leave now · about ${Math.round(minutes)} min · ${stops} stops · ${mode === "fastest" ? "weighted average" : "fewest stops"}</p>
    <ol>${instructions.map(i => `<li>${i.from} → ${i.to} <span class="line-pill" style="background:${LINE_COLOURS[i.line] || '#555'}; color:${i.line === 'Circle' ? '#111' : '#fff'}">${i.line}</span> <small>${i.stops} stop${i.stops === 1 ? '' : 's'}</small></li>`).join("")}</ol>
  </article>`;
}

function highlightRoute(route) {
  const stage = document.querySelector("#mapStage");
  const svg = stage.querySelector("svg");
  if (!svg || !route) return;
  stage.classList.add("route-active");
  svg.querySelectorAll(".route-label,.route-station-dot").forEach(el => el.classList.remove("route-label", "route-station-dot"));
  const wanted = new Set(route.stations.map(canonical));
  svg.querySelectorAll("text,tspan").forEach(el => {
    const text = canonical(el.textContent || "");
    for (const station of wanted) {
      if (text === station || text.includes(station)) { el.classList.add("route-label"); break; }
    }
  });
  // Best-effort dot highlighting: find circles close to highlighted labels in the imported SVG coordinate space.
  svg.querySelectorAll("circle,ellipse").forEach(el => {
    const labelCount = svg.querySelectorAll(".route-label").length;
    if (labelCount && parseFloat(el.getAttribute("r") || el.getAttribute("rx") || 0) <= 7) el.classList.add("route-station-dot");
  });
}

function normaliseInput(value) {
  return stationLookup.get(canonical(value));
}

document.querySelector("#planner").addEventListener("submit", event => {
  event.preventDefault();
  const status = document.querySelector("#status");
  const start = normaliseInput(document.querySelector("#start").value);
  const end = normaliseInput(document.querySelector("#destination").value);
  if (!start || !end) {
    status.textContent = "Choose start and destination from the station suggestions.";
    status.classList.add("show");
    return;
  }
  status.classList.remove("show");
  const fastest = dijkstra(start, end, "fastest");
  const shortest = dijkstra(start, end, "shortest");
  document.querySelector("#results").innerHTML = routeCard("Fastest route", fastest, "fastest") + routeCard("Shortest route", shortest, "shortest");
  highlightRoute(fastest || shortest);
});

async function loadMap() {
  const stage = document.querySelector("#mapStage");
  const note = document.querySelector("#offlineNote");
  try {
    const cached = await caches.open("tube-map-v1");
    let response = await cached.match(MAP_URL);
    if (!response && navigator.onLine) {
      response = await fetch(MAP_URL, { mode: "cors" });
      if (response.ok) await cached.put(MAP_URL, response.clone());
    }
    if (!response) throw new Error("Map not cached yet");
    const svg = await response.text();
    stage.innerHTML = svg;
    note.textContent = "Map cache: ready";
  } catch (error) {
    stage.innerHTML = `<object data="${MAP_URL}" type="image/svg+xml" style="width:100%;min-height:760px;background:white;border-radius:1rem"></object>`;
    note.textContent = "Map cache: first online load needed";
  }
}

async function registerOfflineShell() {
  if (!("serviceWorker" in navigator)) return;
  const sw = `
    const CACHE = 'tube-planner-shell-v1';
    const MAP = ${JSON.stringify(MAP_URL)};
    self.addEventListener('install', event => event.waitUntil(caches.open(CACHE).then(c => c.addAll(['./', MAP]).catch(() => c.addAll(['./'])))));
    self.addEventListener('fetch', event => event.respondWith(caches.match(event.request).then(r => r || fetch(event.request).then(res => {
      const copy = res.clone(); caches.open(CACHE).then(c => c.put(event.request, copy)); return res;
    }).catch(() => caches.match('./')))));
  `;
  const url = URL.createObjectURL(new Blob([sw], { type: "text/javascript" }));
  try { await navigator.serviceWorker.register(url); } catch {}
}

registerOfflineShell();
loadMap();
</script></body>
</html>
